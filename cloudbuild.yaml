steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '$_IMAGE_REPO:$_TAG', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_IMAGE_REPO:$_TAG']
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - --image=$_IMAGE_REPO:$_TAG
      - --project=$_PROJECT_ID
      - --region=$_REGION
      - --platform=managed
      - --service-account=$_SERVICE_ACCOUNT
      - --ingress=$_INGRESS
      - --concurrency=$_CONTAINER_CONCURRENCY
      - --timeout=$_TIMEOUT_SECONDS
      - --max-instances=$_MAX_INSTANCES
      - --quiet
      - --set-env-vars=MODE=mvp,STUB_MODE=false,USE_REFACTORED_SUMMARISER=true,SUMMARY_COMPOSE_MODE=refactored,PDF_WRITER_MODE=rich,PDF_GUARD_ENABLED=true,ENABLE_NOISE_FILTERS=true,SUPERVISOR_MODE=simple,DRIVE_ENABLED=true,WRITE_TO_DRIVE=true,PDF_ENABLED=true,SHEETS_ENABLED=false,ENABLE_METRICS=true,PROJECT_ID=$_PROJECT_ID,REGION=$_REGION,TAG_NAME=$_TAG,DOC_AI_LOCATION=us,DOC_AI_PROCESSOR_ID=21c8becfabc49de6,DOC_AI_OCR_PROCESSOR_ID=21c8becfabc49de6,DRIVE_INPUT_FOLDER_ID=1eyMO0126VfLBK3bBQEpWlVOL6tWxriCE,DRIVE_REPORT_FOLDER_ID=130jJzsl3OBzMD8weGfBOaXikfEnD2KVg,PDF_INPUT_FOLDER_ID=1eyMO0126VfLBK3bBQEpWlVOL6tWxriCE,PDF_OUTPUT_FOLDER_ID=130jJzsl3OBzMD8weGfBOaXikfEnD2KVg,DRIVE_SHARED_DRIVE_ID=0AFPP3mbSAh_oUk9PVA,CMEK_KEY_NAME=$_CMEK_KEY_NAME,INTAKE_GCS_BUCKET=mcc-intake,OUTPUT_GCS_BUCKET=mcc-output,SUMMARY_BUCKET=mcc-output,PIPELINE_STATE_BACKEND=gcs,PIPELINE_STATE_BUCKET=$_PIPELINE_STATE_BUCKET,PIPELINE_STATE_PREFIX=pipeline-state,PIPELINE_WORKFLOW_NAME=projects/$_PROJECT_ID/locations/$_REGION/workflows/$_WORKFLOW_NAME,PIPELINE_SERVICE_BASE_URL=$_PIPELINE_SERVICE_BASE_URL,SUMMARISER_JOB_NAME=$_SUMMARISER_JOB_NAME,PDF_JOB_NAME=$_PDF_JOB_NAME,DRIVE_IMPERSONATION_USER=Matt@moneymediausa.com,GOOGLE_APPLICATION_CREDENTIALS=/tmp/google-application-credentials.json,MIN_SUMMARY_CHARS=300,MIN_SUMMARY_DYNAMIC_RATIO=0.005
      - --remove-secrets=GOOGLE_APPLICATION_CREDENTIALS
      - --update-secrets=OPENAI_API_KEY=OPENAI_API_KEY:latest,SERVICE_ACCOUNT_JSON=mcc_orch_sa_key:latest,INTERNAL_EVENT_TOKEN=internal-event-token:latest
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - run
      - jobs
      - deploy
      - $_SUMMARISER_JOB_NAME
      - --image=$_IMAGE_REPO:$_TAG
      - --project=$_PROJECT_ID
      - --region=$_REGION
      - --service-account=$_JOB_SERVICE_ACCOUNT
      - --tasks=1
      - --max-retries=3
      - --task-timeout=900s
      - --cpu=1
      - --memory=2Gi
      - --command=python
      - --args=-m,src.services.summariser_refactored
      - --set-env-vars=PROJECT_ID=$_PROJECT_ID,REGION=$_REGION,PIPELINE_STATE_BACKEND=gcs,PIPELINE_STATE_BUCKET=$_PIPELINE_STATE_BUCKET,PIPELINE_STATE_PREFIX=pipeline-state,SUMMARY_BUCKET=mcc-output,OUTPUT_BUCKET=mcc-output,OUTPUT_GCS_BUCKET=mcc-output,SUMMARY_SCHEMA_VERSION=2025-10-01,MAX_SHARD_CONCURRENCY=12
      - --update-secrets=OPENAI_API_KEY=OPENAI_API_KEY:latest
      - --quiet
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - run
      - jobs
      - deploy
      - $_PDF_JOB_NAME
      - --image=$_IMAGE_REPO:$_TAG
      - --project=$_PROJECT_ID
      - --region=$_REGION
      - --service-account=$_JOB_SERVICE_ACCOUNT
      - --tasks=1
      - --max-retries=3
      - --task-timeout=900s
      - --cpu=1
      - --memory=2Gi
      - --command=python
      - --args=-m,src.services.pdf_writer_refactored
      - --set-env-vars=PROJECT_ID=$_PROJECT_ID,REGION=$_REGION,PIPELINE_STATE_BACKEND=gcs,PIPELINE_STATE_BUCKET=$_PIPELINE_STATE_BUCKET,PIPELINE_STATE_PREFIX=pipeline-state,SUMMARY_BUCKET=mcc-output,OUTPUT_BUCKET=mcc-output,OUTPUT_GCS_BUCKET=mcc-output,SUMMARY_SCHEMA_VERSION=2025-10-01
      - --quiet
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - workflows
      - deploy
      - $_WORKFLOW_NAME
      - --source=workflows/pipeline.yaml
      - --project=$_PROJECT_ID
      - --location=$_REGION
      - --service-account=$_WORKFLOW_SERVICE_ACCOUNT
      - --set-env-vars=PIPELINE_SERVICE_BASE_URL=$_PIPELINE_SERVICE_BASE_URL,PROJECT_ID=$_PROJECT_ID,REGION=$_REGION,DOC_AI_LOCATION=us,DOC_AI_PROCESSOR_ID=21c8becfabc49de6,SUMMARISER_JOB_NAME=$_SUMMARISER_JOB_NAME,PDF_JOB_NAME=$_PDF_JOB_NAME,INTAKE_GCS_BUCKET=mcc-intake,OUTPUT_GCS_BUCKET=mcc-output,SUMMARY_BUCKET=mcc-output,MAX_SHARD_CONCURRENCY=12,WORKFLOW_CALLER_SA=$_WORKFLOW_SERVICE_ACCOUNT
      - --quiet

